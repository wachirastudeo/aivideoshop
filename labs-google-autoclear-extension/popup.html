<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      color: #ff5722;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 16px;
    }
    .card {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #ff5722, #ff8a65);
      color: white;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .status {
      font-size: 11px;
      color: #34d399;
      text-align: center;
      margin-top: 8px;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #ff5722;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="title">⚡ Labs.google Auto-Clear</div>
  <div class="sub">ตรวจจับ Fail ชั่วคราว & ข้ามเวลานับถอยหลัง</div>

  <div class="card">
    <div class="row">
      <span style="font-size: 13px; font-weight: 500;">เปิดระบบตรวจจับอัตโนมัติ</span>
      <input type="checkbox" id="autoToggle" checked>
    </div>
  </div>

  <button class="btn" id="manualClearBtn">🧹 กดล้างแคช & รีเฟรชทันที</button>
  
  <div class="status">🟢 Extension พร้อมทำงาน 24/7</div>

  <script src="popup.js"></script>
</body>
</html>

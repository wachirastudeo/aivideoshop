<div class="source-switch" role="tablist" aria-label="แหล่งสินค้า">
  <button class="source-switch__button source-switch__button--active" data-source="tiktok" type="button">TikTok</button>
  <button class="source-switch__button" data-source="shopee" type="button">Shopee</button>
</div>

<section id="source-shopee" class="section" hidden>
  <div class="section__header">
    <h2>ดึงสินค้า Shopee Affiliate</h2>
  </div>
  <div class="section__body">
    <p class="hint">ค้นหาสินค้าจาก affiliate.shopee.co.th แล้วติ๊ก N ชิ้นแรก กด Export ของเว็บเพื่อดาวน์โหลดไฟล์ CSV (ต้องล็อกอิน Shopee Affiliate ใน Chrome ก่อน)</p>
    <div class="field">
      <label class="field__label" for="shopee-keyword">คำค้นหา</label>
      <input id="shopee-keyword" class="input" type="search" placeholder="เช่น พัดลมพกพา">
    </div>
    <div class="field">
      <label class="field__label" for="shopee-count">จำนวนที่ต้องการ</label>
      <input id="shopee-count" class="input" type="number" min="1" max="500" value="10">
    </div>
    <div class="field">
      <label class="field__label" for="shopee-min-comm">ค่าคอมขั้นต่ำ % (เว้นว่าง = ไม่กรอง)</label>
      <input id="shopee-min-comm" class="input" type="number" min="0" max="100" step="1" placeholder="เช่น 5">
    </div>
    <button id="shopee-pull" class="button button--primary button--full" type="button">ดึง → Export CSV + ทำวิดีโอ</button>
    <div id="shopee-status" class="hint" aria-live="polite"></div>
  </div>
</section>

<section id="source-tiktok" class="section" data-collapsible data-collapse-key="products.filters">
  <div class="section__header">
    <h2>สินค้า TikTok Showcase</h2>
    <button id="connect-tiktok" class="button button--ghost" type="button">เชื่อมต่อ</button>
  </div>
  <div class="section__body">
    <div class="product-toolbar">
      <input id="product-search" class="input" type="search" placeholder="ค้นหาสินค้า">
      <select id="product-sort" class="select" aria-label="เรียงสินค้า">
        <option value="newest" selected>ล่าสุด (ค่าเริ่มต้น)</option>
        <option value="name">ชื่อ</option>
        <option value="commission">ค่าคอมฯ</option>
        <option value="price">ราคา</option>
        <option value="stock">สต็อก</option>
      </select>
      <button id="refresh-products" class="icon-button" type="button" title="Refresh" aria-label="Refresh">
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.2" aria-hidden="true">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
        </svg>
      </button>
    </div>

    <div class="batch-actions">
      <label class="checkbox-row">
        <input id="select-all-products" type="checkbox"> เลือกทั้งหมด
      </label>
      <button id="create-batch-videos" class="button button--primary" type="button" disabled>สร้างวิดีโอ (0)</button>
    </div>
    <div id="product-list" class="product-list"></div>
    <div id="pagination-controls" class="pagination-container"></div>
    <button id="load-more-products" class="button button--ghost button--full" type="button" hidden>โหลดข้อมูลจาก TikTok เพิ่ม (ชุดถัดไป)</button>
  </div>
</section>

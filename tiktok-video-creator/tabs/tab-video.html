<section class="section">
  <div class="section__header">
    <div class="section-title-row">
      <h2>คิวสินค้าที่เลือก (<span id="queue-count">0</span>)</h2>
    </div>
  </div>
  <div id="batch-product-list" class="section__body stack">
    <!-- รายการสินค้าจะถูกสร้างที่นี่จาก tab-video.js -->
  </div>
</section>

<section class="section section--sticky">
  <div class="inline-actions">
    <button class="button button--primary" id="btn-batch-create" type="button">🎬 สร้างวิดีโอทั้งหมด</button>
    <button class="button button--danger" id="btn-batch-stop" type="button" style="display:none">⏹️ หยุดทำงาน</button>
  </div>
</section>

<section class="section">
  <div class="section__header">
    <div class="section-title-row">
      <h2>การตั้งค่าภาพรวมวิดีโอ</h2>
    </div>
  </div>
  <div class="section__body card stack settings-card">
    <!-- สไตล์วิดีโอ -->
    <label class="field">
      <span class="field__label">สไตล์วิดีโอหลัก</span>
      <select id="video-style" class="select select--accent">
        <!-- จะถูกเติมข้อมูลจาก VIDEO_STYLES ใน tab-video.js -->
      </select>
    </label>

    <!-- อารมณ์ -->
    <div class="field">
      <span class="field__label">อารมณ์ของวิดีโอ (Mood)</span>
      <div id="mood-pills" class="pill-group"></div>
    </div>

    <!-- ผู้ดำเนินรายการ -->
    <label class="field">
      <span class="field__label">ตัวละคร/คนรีวิว (Presenter)</span>
      <select id="presenter" class="select">
        <option value="Auto">✨ อัตโนมัติ</option>
        <option value="none">🚫 ไม่มีคน (เน้นเฉพาะสินค้า)</option>
        <option value="woman">👩 ผู้หญิง (วัยรุ่น/สดใส)</option>
        <option value="man">👨 ผู้ชาย (เท่/น่าเชื่อถือ)</option>
        <option value="cartoon3d">🧸 ตัวการ์ตูน 3D (สไตล์ Pixar/Cute)</option>
        <option value="living_product">🍎 สินค้ามีชีวิต (Product as Character)</option>
      </select>
    </label>

    <!-- โทนเสียง -->
    <label class="field">
      <span class="field__label">โทนเสียงพากย์ (Voice Tone)</span>
      <select id="voice-tone" class="select">
        <option value="Auto">✨ อัตโนมัติ</option>
        <option value="kind">😊 ใจดี / เป็นกันเอง (Kind & Friendly)</option>
        <option value="fun">🎉 สนุกสนาน / พลังล้น (Fun & Energetic)</option>
        <option value="complain">😤 ขี้บ่น/จิกกัดตลกๆ (Funny Complain)</option>
        <option value="professional">🧐 มืออาชีพ / ให้ความรู้ (Expert/Pro)</option>
        <option value="hype">🤩 ตื่นเต้นสุดขีด (Super Excited/Hype)</option>
      </select>
    </label>

    <!-- สถานที่ -->
    <label class="field">
      <span class="field__label">ฉากสถานที่ในวิดีโอ (Location)</span>
      <select id="location" class="select">
        <option value="Auto">✨ อัตโนมัติ</option>
        <option value="Studio Minimal">🏠 สตูดิโอมินิมอล (ขาว/สะอาด)</option>
        <option value="Modern Living Room">🛋️ ห้องนั่งเล่นทันสมัย</option>
        <option value="Warehouse / Stockroom">📦 โกดังสินค้า / สต็อกของ</option>
        <option value="Urban Street">🏙️ ย่านธุรกิจ / ริมถนนในเมือง</option>
        <option value="Nature / Outdoor">🌳 ธรรมชาติ / สวนสาธารณะ</option>
        <option value="Luxury Showroom">✨ โชว์รูมหรูหรา</option>
        <option value="Cafe / Coffee Shop">☕ คาเฟ่เก๋ๆ</option>
        <option value="Office / Workspace">💻 ห้องทำงาน / ออฟฟิศ</option>
      </select>
    </label>

    <label class="field">
      <span class="field__label">ข้อความในวิดีโอ</span>
      <select id="show-name" class="select">
        <option value="false">ไม่เอา</option>
        <option value="true">เอา</option>
      </select>
    </label>

    <!-- ข้อความโปรโมชั่น -->
    <label class="field video-text-setting">
      <span class="field__label">ข้อความโปรโมชั่น (มุมจอ)</span>
      <input id="promotion-text" class="input" type="text" placeholder="เช่น ลด 50% / ส่งฟรี / มีเก็บเงินปลายทาง">
    </label>

    <!-- ตำแหน่งข้อความ -->
    <label class="field video-text-setting">
      <span class="field__label">ตำแหน่งของข้อความ</span>
      <select id="text-position" class="select">
        <option value="Auto">✨ อัตโนมัติ</option>
        <option value="Bottom safe area">📍 ด้านล่าง (พื้นที่ปลอดภัย)</option>
        <option value="Center overlay">📍 ตรงกลางภาพ</option>
        <option value="Top third">📍 ด้านบน</option>
      </select>
    </label>

    <!-- มุมกล้อง -->
    <label class="field">
      <span class="field__label">การเคลื่อนไหวของมุมกล้อง</span>
      <select id="camera-movement" class="select">
        <option value="Auto">✨ อัตโนมัติ (AI เลือกให้)</option>
        <option value="Slow Zoom In">🔍 ซูมเข้าช้าๆ (เน้นสินค้า)</option>
        <option value="Orbit / 360°">🔄 หมุนรอบสินค้า 360°</option>
        <option value="Pan Left to Right">↔️ แพนกล้อง ซ้าย-ขวา</option>
        <option value="Static/Still">📍 กล้องนิ่ง (ตั้งใจโชว์)</option>
        <option value="Handheld Shake">🤳 ถือถ่าย (สไตล์รีวิวบ้านๆ)</option>
        <option value="Push In Fast">⚡ พุ่งเข้าหาอย่างไว (ตื่นเต้น)</option>
      </select>
    </label>
  </div>
</section>

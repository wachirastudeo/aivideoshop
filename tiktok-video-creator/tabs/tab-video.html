<section class="flow-dashboard" aria-labelledby="flow-dashboard-title">
  <header class="flow-hero">
    <div>
      <p class="eyebrow">Google Flow Pipeline</p>
      <h2 id="flow-dashboard-title">สร้างภาพ แล้วต่อวิดีโออัตโนมัติ</h2>
      <p class="flow-hero__copy">ใช้รูปสินค้าจาก TikTok เป็น reference, อัปโหลดเข้า Flow, กรอก prompt แล้วสร้างต่อเนื่องในหน้าเดียว</p>
    </div>
    <div class="flow-hero__stats" aria-label="Queue summary">
      <span class="flow-badge-stat">
        <span class="flow-badge-stat__dot"></span>
        <span class="flow-badge-stat__value" id="queue-count">0</span> สินค้าในคิว
      </span>
      <span class="flow-badge-stat">
        <span class="flow-badge-stat__dot flow-badge-stat__dot--active"></span>
        <span class="flow-badge-stat__value" id="ready-count">0</span> พร้อมทำงาน
      </span>
    </div>
  </header>

  <div class="flow-layout">
    <section class="flow-panel flow-panel--queue" aria-labelledby="queue-title">
      <div class="flow-panel__header">
        <div>
          <p class="eyebrow">Selected Products</p>
          <h3 id="queue-title">คิวสินค้า</h3>
        </div>
      </div>
      <div id="batch-product-list" class="flow-queue" aria-live="polite"></div>
    </section>

    <aside class="flow-panel flow-panel--settings" aria-labelledby="settings-title">
      <div class="flow-panel__header">
        <div>
          <p class="eyebrow">Prompt Controls</p>
          <h3 id="settings-title">ตั้งค่ารวม</h3>
        </div>
      </div>

      <div class="settings-stack">
        <label class="field">
          <span class="field__label">สไตล์วิดีโอหลัก</span>
          <select id="video-style" class="select select--accent"></select>
        </label>
        <div class="settings-grid">
          <label class="field">
            <span class="field__label">โมเดลรูปภาพ (Banana)</span>
            <select id="image-model" class="select">
              <option value="nano-banana-pro">Banana Pro (แนะนำ)</option>
              <option value="nano-banana-2">Banana 2</option>
            </select>
          </label>
          <label class="field">
            <span class="field__label">โมเดลวิดีโอ (Veo)</span>
            <select id="video-model" class="select">
              <option value="veo-3.1-fast">Veo 3.1 - Fast</option>
              <option value="veo-3.1-quality">Veo 3.1 - Quality</option>
              <option value="veo-3.1-lite">Veo 3.1 - Lite</option>
              <option value="veo-3.1-lite-low-priority">Veo 3.1 - Lite [Lower Priority] ⭐ (0 เครดิต)</option>
              <option value="omni-flash">Omni Flash</option>
            </select>
          </label>
        </div>

        <div class="settings-grid">
          <label class="field">
            <span class="field__label">จำนวนรูปภาพ</span>
            <select id="image-count" class="select">
              <option value="1">1 รูป</option>
              <option value="2">2 รูป</option>
              <option value="4">4 รูป</option>
              <option value="8">8 รูป</option>
            </select>
          </label>
          <label class="field">
            <span class="field__label">จำนวนวิดีโอ</span>
            <select id="video-count" class="select">
              <option value="1">1 คลิป</option>
              <option value="2">2 คลิป</option>
              <option value="4">4 คลิป</option>
            </select>
          </label>
        </div>

        <div class="settings-grid">
          <label class="field">
            <span class="field__label">ความยาววิดีโอ</span>
            <select id="video-duration" class="select">
              <option value="5">5 วินาที</option>
              <option value="8">8 วินาที</option>
              <option value="10">10 วินาที</option>
            </select>
          </label>
          <label class="field">
            <span class="field__label">สัดส่วน</span>
            <select id="aspect-ratio" class="select">
              <option value="9:16">9:16 TikTok</option>
              <option value="16:9">16:9</option>
              <option value="1:1">1:1</option>
            </select>
          </label>
        </div>

        <div class="field">
          <span class="field__label">Mood</span>
          <div id="mood-pills" class="pill-group"></div>
        </div>

        <div class="settings-grid">
          <label class="field">
            <span class="field__label">Presenter</span>
            <select id="presenter" class="select">
              <option value="Auto">อัตโนมัติ</option>
              <option value="none">ไม่มีคน</option>
              <option value="woman">ผู้หญิง</option>
              <option value="man">ผู้ชาย</option>
              <option value="cartoon3d">ตัวการ์ตูน 3D</option>
              <option value="living_product">สินค้ามีชีวิต</option>
            </select>
          </label>
          <label class="field">
            <span class="field__label">Voice</span>
            <select id="voice-tone" class="select">
              <option value="Auto">อัตโนมัติ</option>
              <option value="kind">ใจดี</option>
              <option value="fun">สนุกสนาน</option>
              <option value="complain">ขี้บ่น</option>
              <option value="professional">มืออาชีพ</option>
              <option value="hype">ตื่นเต้น</option>
            </select>
          </label>
        </div>

        <div class="settings-grid">
          <label class="field">
            <span class="field__label">Location</span>
            <select id="location" class="select">
              <option value="Auto">อัตโนมัติ</option>
              <option value="Studio Minimal">Studio Minimal</option>
              <option value="Modern Living Room">Modern Living Room</option>
              <option value="Warehouse / Stockroom">Warehouse / Stockroom</option>
              <option value="Urban Street">Urban Street</option>
              <option value="Nature / Outdoor">Nature / Outdoor</option>
              <option value="Luxury Showroom">Luxury Showroom</option>
              <option value="Cafe / Coffee Shop">Cafe / Coffee Shop</option>
              <option value="Office / Workspace">Office / Workspace</option>
            </select>
          </label>
          <label class="field">
            <span class="field__label">Camera</span>
            <select id="camera-movement" class="select">
              <option value="Auto">อัตโนมัติ</option>
              <option value="Slow Zoom In">Slow Zoom In</option>
              <option value="Orbit / 360°">Orbit / 360</option>
              <option value="Pan Left to Right">Pan Left to Right</option>
              <option value="Static/Still">Static</option>
              <option value="Handheld Shake">Handheld</option>
              <option value="Push In Fast">Push In Fast</option>
            </select>
          </label>
        </div>

        <div class="settings-grid">
          <label class="field">
            <span class="field__label">ข้อความในคลิป</span>
            <select id="show-name" class="select">
              <option value="false">ปิด</option>
              <option value="true">เปิด</option>
            </select>
          </label>
          <label class="field video-text-setting">
            <span class="field__label">ตำแหน่งข้อความ</span>
            <select id="text-position" class="select">
              <option value="Auto">อัตโนมัติ</option>
              <option value="Bottom safe area">ด้านล่าง</option>
              <option value="Center overlay">ตรงกลาง</option>
              <option value="Top third">ด้านบน</option>
            </select>
          </label>
        </div>

        <label class="field video-text-setting">
          <span class="field__label">ข้อความโปรโมชั่น</span>
          <input id="promotion-text" class="input" type="text" placeholder="ลด 50% / ส่งฟรี / เก็บเงินปลายทาง">
        </label>
        
        <label class="field">
          <span class="field__label">การทำงานหลังสร้างเสร็จ</span>
          <select id="post-action" class="select select--accent">
            <option value="download">ดาวน์โหลดวิดีโอ</option>
            <option value="post">โพสต์ TikTok</option>
            <option value="both">ดาวน์โหลดและโพสต์</option>
          </select>
        </label>
      </div>
    </aside>
  </div>
</section>

<section class="section section--sticky flow-action-bar" aria-label="Batch actions">
  <div class="inline-actions">
    <button class="button button--primary button--full flow-primary-action" id="btn-batch-create" type="button">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px; margin-right: 6px; display: inline-block; vertical-align: middle;"><path d="M12 3l1.8 5.4L19 10l-5.2 1.6L12 17l-1.8-5.4L5 10l5.2-1.6L12 3z"></path></svg>
      สร้างภาพและวิดีโอทั้งหมด
    </button>
    <button class="button button--danger button--full flow-primary-action" id="btn-batch-stop" type="button" hidden>
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px; margin-right: 6px; display: inline-block; vertical-align: middle;"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect></svg>
      หยุดทำงาน
    </button>
  </div>
</section>

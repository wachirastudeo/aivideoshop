<section class="section">
  <div class="section__header">
    <div class="section-title-row">
      <h2>คิวสินค้าที่เลือก (<span id="queue-count">0</span>)</h2>
    </div>
  </div>
  <div id="batch-product-list" class="section__body stack">
    <!-- รายการสินค้าจะถูกสร้างที่นี่จาก tab-video.js -->
  </div>
</section>

<section class="section">
  <div class="section__header">
    <div class="section-title-row">
      <h2>การตั้งค่าภาพรวมวิดีโอ</h2>
    </div>
  </div>
  <div class="section__body card stack settings-card">
    <div class="settings-group">
      <!-- สไตล์วิดีโอ -->
      <label class="field">
        <span class="field__label">สไตล์วิดีโอหลัก</span>
        <select id="video-style" class="select select--accent">
          <!-- จะถูกเติมข้อมูลจาก VIDEO_STYLES ใน tab-video.js -->
        </select>
      </label>

      <!-- อารมณ์ -->
      <div class="field">
        <span class="field__label">อารมณ์ของวิดีโอ (Mood)</span>
        <div id="mood-pills" class="pill-group"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="settings-grid">
      <!-- ผู้ดำเนินรายการ -->
      <label class="field">
        <span class="field__label">ตัวละคร (Presenter)</span>
        <select id="presenter" class="select">
          <option value="Auto">✨ อัตโนมัติ</option>
          <option value="none">🚫 ไม่มีคน</option>
          <option value="woman">👩 ผู้หญิง</option>
          <option value="man">👨 ผู้ชาย</option>
          <option value="cartoon3d">🧸 ตัวการ์ตูน 3D</option>
          <option value="living_product">🍎 สินค้ามีชีวิต</option>
        </select>
      </label>

      <!-- โทนเสียง -->
      <label class="field">
        <span class="field__label">เสียงพากย์ (Voice)</span>
        <select id="voice-tone" class="select">
          <option value="Auto">✨ อัตโนมัติ</option>
          <option value="kind">😊 ใจดี</option>
          <option value="fun">🎉 สนุกสนาน</option>
          <option value="complain">😤 ขี้บ่น</option>
          <option value="professional">🧐 มืออาชีพ</option>
          <option value="hype">🤩 ตื่นเต้น</option>
        </select>
      </label>
    </div>

    <div class="settings-grid">
      <!-- สถานที่ -->
      <label class="field">
        <span class="field__label">สถานที่ (Location)</span>
        <select id="location" class="select">
          <option value="Auto">✨ อัตโนมัติ</option>
          <option value="Studio Minimal">🏠 สตูดิโอมินิมอล</option>
          <option value="Modern Living Room">🛋️ ห้องนั่งเล่น</option>
          <option value="Warehouse / Stockroom">📦 โกดังสินค้า</option>
          <option value="Urban Street">🏙️ ริมถนนในเมือง</option>
          <option value="Nature / Outdoor">🌳 ธรรมชาติ</option>
          <option value="Luxury Showroom">✨ โชว์รูมหรูหรา</option>
          <option value="Cafe / Coffee Shop">☕ คาเฟ่เก๋ๆ</option>
          <option value="Office / Workspace">💻 ห้องทำงาน</option>
        </select>
      </label>

      <!-- มุมกล้อง -->
      <label class="field">
        <span class="field__label">มุมกล้อง (Camera)</span>
        <select id="camera-movement" class="select">
          <option value="Auto">✨ อัตโนมัติ</option>
          <option value="Slow Zoom In">🔍 ซูมเข้าช้าๆ</option>
          <option value="Orbit / 360°">🔄 หมุนรอบสินค้า</option>
          <option value="Pan Left to Right">↔️ แพนซ้าย-ขวา</option>
          <option value="Static/Still">📍 กล้องนิ่ง</option>
          <option value="Handheld Shake">🤳 ถือถ่าย</option>
          <option value="Push In Fast">⚡ พุ่งเข้าหา</option>
        </select>
      </label>
    </div>

    <div class="divider"></div>

    <div class="settings-grid">
      <!-- ข้อความในคลิป -->
      <label class="field">
        <span class="field__label">ข้อความในคลิป</span>
        <select id="show-name" class="select">
          <option value="false">ปิด (เน้นภาพ)</option>
          <option value="true">เปิด (มีตัวหนังสือ)</option>
        </select>
      </label>

      <!-- ตำแหน่งข้อความ -->
      <label class="field video-text-setting">
        <span class="field__label">ตำแหน่งข้อความ</span>
        <select id="text-position" class="select">
          <option value="Auto">✨ อัตโนมัติ</option>
          <option value="Bottom safe area">📍 ด้านล่าง</option>
          <option value="Center overlay">📍 ตรงกลางภาพ</option>
          <option value="Top third">📍 ด้านบน</option>
        </select>
      </label>
    </div>

    <!-- ข้อความโปรโมชั่น -->
    <label class="field video-text-setting">
      <span class="field__label">ข้อความโปรโมชั่น (มุมจอ)</span>
      <input id="promotion-text" class="input" type="text" placeholder="เช่น ลด 50% / ส่งฟรี / เก็บเงินปลายทาง">
    </label>
  </div>
</section>

<section class="section section--sticky">
  <div class="inline-actions">
    <button class="button button--primary button--full" id="btn-batch-create" type="button" style="font-size: 14px; height: 44px;">🎬 สร้างวิดีโอทั้งหมด</button>
    <button class="button button--danger button--full" id="btn-batch-stop" type="button" style="display:none; font-size: 14px; height: 44px;">⏹️ หยุดทำงาน</button>
  </div>
</section>

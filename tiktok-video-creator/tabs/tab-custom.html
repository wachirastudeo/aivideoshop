<section class="flow-dashboard custom-creator" aria-labelledby="custom-creator-title">
  <header class="flow-hero">
    <div>
      <p class="eyebrow">Google Flow Freeform</p>
      <h2 id="custom-creator-title">สร้างวิดีโออิสระ + โพสต์ TikTok</h2>
      <p class="flow-hero__copy">เจนภาพและวิดีโอใน Google Flow โดยแนบรูปภาพอ้างอิงหรือไม่ก็ได้ จากนั้นระบบจะดาวน์โหลดและโพสต์ไปยัง TikTok อัตโนมัติ</p>
    </div>
  </header>

  <div class="flow-layout" style="grid-template-columns: 1fr;">
    <section class="flow-panel">
      <div class="flow-panel__header">
        <div>
          <p class="eyebrow">Prompt Settings</p>
          <h3>รายละเอียดวิดีโอและโพสต์</h3>
        </div>
      </div>
      <div class="settings-stack">
        <!-- อัปโหลดรูปภาพอ้างอิง (ไม่บังคับ) -->
        <div class="field">
          <label class="field__label" for="custom-image-file">รูปภาพอ้างอิง / คีย์เวิร์ดภาพสินค้า (ไม่บังคับ)</label>
          <input id="custom-image-file" class="input" type="file" accept="image/*">
          <span class="field__hint" id="custom-image-file-info">ยังไม่ได้เลือกรูปภาพ (เว้นว่างไว้เพื่อเจนจากข้อความล้วน)</span>
        </div>

        <label class="field">
          <span class="field__label">Prompt (ภาษาอังกฤษ เพื่อผลลัพธ์ที่ดีที่สุด)</span>
          <textarea id="custom-prompt" class="textarea" rows="4" placeholder="เช่น A cinematic video of a cozy wooden cabin in the snow, warm lights shining through the window, camera slowly zooming in, 4k..."></textarea>
        </label>

        <div class="settings-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <label class="field">
            <span class="field__label">โหมดการสร้าง</span>
            <select id="custom-flow-mode" class="select">
              <option value="combined" selected>สร้างภาพนิ่ง แล้วต่อวิดีโอ (2 ขั้นตอน)</option>
              <option value="video">สร้างวิดีโอโดยตรง (1 ขั้นตอน)</option>
            </select>
          </label>
          <label class="field">
            <span class="field__label">โมเดลวิดีโอ (Veo)</span>
            <select id="custom-video-model" class="select">
              <option value="veo-3.1-lite-low-priority" selected>Veo 3.1 - Lite (0 เครดิต)</option>
              <option value="veo-3.1-fast">Veo 3.1 - Fast</option>
              <option value="veo-3.1-quality">Veo 3.1 - Quality</option>
              <option value="omni-flash">Omni Flash</option>
            </select>
          </label>
        </div>

        <div class="settings-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <label class="field">
            <span class="field__label">ความยาววิดีโอ</span>
            <select id="custom-video-duration" class="select">
              <option value="5">5 วินาที</option>
              <option value="8" selected>8 วินาที</option>
              <option value="10">10 วินาที</option>
            </select>
          </label>
          <label class="field">
            <span class="field__label">สัดส่วนวิดีโอ</span>
            <select id="custom-aspect-ratio" class="select">
              <option value="9:16" selected>9:16 TikTok</option>
              <option value="16:9">16:9 แนวนอน</option>
            </select>
          </label>
        </div>

        <hr style="border:0; border-top: 1px solid var(--line); margin: 8px 0;">

        <!-- รายละเอียดโพสต์ TikTok -->
        <label class="field">
          <span class="field__label">Caption สำหรับโพสต์ TikTok (ไม่บังคับ)</span>
          <textarea id="custom-caption" class="textarea" rows="3" placeholder="เขียนแคปชั่นอธิบายวิดีโอ..."></textarea>
        </label>

        <label class="field">
          <span class="field__label">Hashtags (คั่นด้วยเครื่องหมายจุลภาค , )</span>
          <input id="custom-hashtags" class="input" type="text" placeholder="เช่น #ของดีบอกต่อ, #รีวิว, #ฮิต">
        </label>

        <div class="settings-grid" style="display: grid; grid-template-columns: 1fr; gap: 12px;">
          <label class="field">
            <span class="field__label">การทำงานหลังสร้างเสร็จ</span>
            <select id="custom-post-action" class="select select--accent">
              <option value="download" selected>ดาวน์โหลดอย่างเดียว</option>
              <option value="draft">ดาวน์โหลด + บันทึกแบบร่าง TikTok</option>
              <option value="post">ดาวน์โหลด + โพสต์ TikTok ทันที</option>
              <option value="schedule">ดาวน์โหลด + ตั้งเวลาโพสต์ TikTok</option>
            </select>
          </label>
        </div>

        <!-- ตั้งเวลาโพสต์ -->
        <label class="field" id="custom-schedule-time-container" style="display: none;">
          <span class="field__label">เวลาที่ต้องการโพสต์</span>
          <div style="display: flex; gap: 8px;">
            <input id="custom-post-schedule-date" class="input" type="date" style="flex: 1;">
            <input id="custom-post-schedule-time" class="input" type="time" style="flex: 1;">
          </div>
        </label>

        <div style="margin-top: 15px; display: flex; gap: 8px;">
          <button id="custom-btn-clear" class="button button--ghost" style="flex: 1;" type="button">ล้างค่า</button>
          <button id="custom-btn-create" class="button button--primary" style="flex: 2;" type="button">🎥 เริ่มสร้างและโพสต์</button>
        </div>
        <p class="field__hint" id="custom-status" role="status"></p>
      </div>
    </section>
  </div>
</section>

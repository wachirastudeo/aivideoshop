<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TikTok Video Creator</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <img class="app-header__logo" src="assets/icon.svg" alt="">
        <div>
          <h1>TikTok Video Creator</h1>
          <p>สร้างวิดีโอสินค้าแบบ 2 phase</p>
        </div>
        <a class="icon-button" href="options/options.html" target="_blank" title="ตั้งค่า" aria-label="ตั้งค่า">⚙</a>
      </header>

      <nav class="tab-bar" aria-label="เมนูหลัก">
        <button class="tab-bar__button tab-bar__button--active" data-tab="video" type="button">🎬 สร้างวิดีโอ</button>
        <button class="tab-bar__button" data-tab="products" type="button">🛍️ สินค้า TikTok</button>
      </nav>

      <section id="status" class="status" role="status" aria-live="polite" hidden></section>
      <section id="tab-root" class="tab-root" aria-busy="true"></section>
      <section class="activity-log" aria-label="Activity log">
        <div class="activity-log__header">
          <h2>สถานะการทำงาน</h2>
          <div class="activity-log__actions">
            <button id="toggle-log" class="activity-log__clear" type="button" title="ซ่อน/แสดง Log">▼</button>
            <button id="clear-log" class="activity-log__clear" type="button">Clear</button>
          </div>
        </div>
        <ol id="activity-log-list" class="activity-log__list" aria-live="polite"></ol>
      </section>
    </main>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>

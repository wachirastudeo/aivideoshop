<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TikTok Video Creator</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="app-shell">
      <nav class="tab-bar" aria-label="เมนูหลัก">
        <button class="tab-bar__button tab-bar__button--active" data-tab="video" type="button">
          <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.2" aria-hidden="true">
            <path d="M23 7l-7 5 7 5V7z"></path>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
          </svg>สร้างวิดีโอ
        </button>
        <button class="tab-bar__button" data-tab="products" type="button">
          <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.2" aria-hidden="true">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 0 1-8 0"></path>
          </svg>ดึงสินค้า
        </button>
        <button class="tab-bar__button" data-tab="post" type="button">
          <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.2" aria-hidden="true">
            <path d="M22 2L11 13"></path>
            <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
          </svg>โพสต์ TikTok
        </button>
        <a class="tab-bar__button tab-bar__settings" href="options/options.html" target="_blank" title="ตั้งค่า" aria-label="ตั้งค่า">
          <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </a>
      </nav>

      <section id="status" class="status" role="status" aria-live="polite" hidden></section>
      <section id="tab-root" class="tab-root" aria-busy="true"></section>
      <section class="activity-log activity-log--collapsed" aria-label="Activity log">
        <div class="activity-log__header">
          <h2>สถานะการทำงาน</h2>
          <div class="activity-log__actions">
            <button id="toggle-log" class="activity-log__clear" type="button" title="ซ่อน/แสดง Log" aria-label="ซ่อน/แสดง Log">
              <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" aria-hidden="true">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <button id="clear-log" class="activity-log__clear" type="button">Clear</button>
          </div>
        </div>
        <ol id="activity-log-list" class="activity-log__list" aria-live="polite"></ol>
      </section>
    </main>

    <!-- Global Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" hidden>
      <div class="loading-overlay__content">
        <div id="loading-overlay-spinner" class="loading-overlay__spinner" aria-hidden="true"></div>
        <div id="loading-overlay-text" class="loading-overlay__text">กำลังดำเนินการ...</div>
        <button id="loading-overlay-btn" class="button button--primary" style="margin-top: 15px; width: 100%; display: none;" type="button">กดยืนยันตัวตนเสร็จแล้ว ดึงรูปต่อ</button>
      </div>
    </div>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
